<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E30613">
<title>Cartera GMAZ</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#E30613;--rojo-o:#B00010;
  --negro:#0A0A0A;--gris-o:#1A1A1A;
  --panel:#F4F4F4;--borde:#E4E4E4;
  --txt:#1A1A1A;--txt-s:#6B6B6B;
  --verde:#00875A;--amarillo:#D97706;--alerta:#DC2626;
  --blanco:#FFFFFF;--azul:#2563EB;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--negro);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;top:-40%;right:-30%;width:600px;height:600px;background:radial-gradient(circle,rgba(227,6,19,.15) 0%,transparent 65%);pointer-events:none}
#login-screen::after{content:'CARTERA';position:absolute;bottom:-20px;left:-10px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:120px;color:rgba(255,255,255,.03);pointer-events:none;user-select:none}
.login-logo{text-align:center;margin-bottom:40px;animation:fadeDown .6s ease both}
.login-logo .marca{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;color:var(--blanco);letter-spacing:-1px;line-height:1}
.login-logo .marca span{color:var(--rojo)}
.login-logo .sub{font-size:12px;font-weight:500;color:var(--txt-s);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.login-card{background:var(--gris-o);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;animation:fadeUp .6s ease .1s both}
.login-card h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--blanco);margin-bottom:24px}
.campo{margin-bottom:16px}
.campo label{display:block;font-size:11px;font-weight:600;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.campo input,.campo select,.campo textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:13px 16px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--blanco);outline:none;transition:border-color .2s}
.campo input:focus,.campo select:focus{border-color:var(--rojo)}
.campo select option{background:#1A1A1A;color:#fff}
.btn-login{width:100%;background:var(--rojo);color:var(--blanco);border:none;border-radius:10px;padding:16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:1px;cursor:pointer;margin-top:8px;transition:background .2s,transform .1s}
.btn-login:active{transform:scale(.98);background:var(--rojo-o)}
.err-msg{color:#ff6b6b;font-size:13px;text-align:center;margin-top:12px;display:none}

/* ── SHELL ── */
#app{display:none;min-height:100vh;background:var(--panel);flex-direction:column}
.topbar{background:var(--negro);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--rojo)}
.t-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--blanco)}
.t-logo span{color:var(--rojo)}
.t-mod{font-size:10px;font-weight:600;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase}
.t-right{display:flex;align-items:center;gap:9px}
.u-badge{background:rgba(255,255,255,.08);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--blanco)}
.btn-salir{background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 10px;color:var(--txt-s);font-size:12px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .2s}
.btn-salir:hover{border-color:var(--rojo);color:var(--rojo)}
.tabs-bar{background:var(--negro);display:flex;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:80px;padding:11px 8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn.activo{color:var(--blanco);border-bottom-color:var(--rojo)}
.main{padding:16px;max-width:640px;margin:0 auto;width:100%}

/* ── CARDS ── */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.res-card{background:var(--blanco);border-radius:12px;padding:13px 15px;border:1px solid var(--borde);animation:fadeUp .4s ease both}
.res-card.full{grid-column:1/-1}
.res-card.tri{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.res-card.tri .kpi{padding:10px 14px;border-right:1px solid var(--borde)}
.res-card.tri .kpi:last-child{border-right:none}
.etq{font-size:10px;font-weight:600;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.val-big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--txt);line-height:1}
.val-big.rojo{color:var(--alerta)}.val-big.am{color:var(--amarillo)}.val-big.verde{color:var(--verde)}.val-big.azul{color:var(--azul)}
.val-sm{font-size:11px;color:var(--txt-s);margin-top:3px}

/* ── FILTROS ── */
.f-sec{margin-bottom:11px}
.f-lbl{font-size:10px;font-weight:700;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block}
.f-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.f-bar::-webkit-scrollbar{display:none}
.f-btn{background:var(--blanco);border:1.5px solid var(--borde);border-radius:20px;padding:5px 13px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;color:var(--txt-s);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.f-btn.activo{background:var(--negro);border-color:var(--negro);color:var(--blanco)}
.ruta-wrap{margin-bottom:12px;position:relative}
.ruta-wrap select{width:100%;background:var(--blanco);border:1.5px solid var(--borde);border-radius:10px;padding:9px 34px 9px 13px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--txt);outline:none;appearance:none;cursor:pointer}
.ruta-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--txt-s);font-size:13px;pointer-events:none}
.busq-wrap{position:relative;margin-bottom:13px}
.busq-wrap input{width:100%;background:var(--blanco);border:1.5px solid var(--borde);border-radius:10px;padding:10px 16px 10px 38px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .2s}
.busq-wrap input:focus{border-color:var(--rojo)}
.busq-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--txt-s)}

/* ── CLIENTE CARDS ── */
.sec-tit{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.c-lista{display:flex;flex-direction:column;gap:8px}
.c-card{background:var(--blanco);border-radius:12px;border:1.5px solid var(--borde);padding:13px 13px 11px;cursor:pointer;transition:all .15s;animation:fadeUp .3s ease both;position:relative;overflow:hidden}
.c-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.c-card.verde::before{background:var(--verde)}.c-card.amarillo::before{background:var(--amarillo)}.c-card.rojo::before{background:var(--alerta)}
.c-card:active{transform:scale(.99)}
.c-r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.c-ruta{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--rojo)}
.c-saldo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;white-space:nowrap}
.c-saldo.verde{color:var(--verde)}.c-saldo.amarillo{color:var(--amarillo)}.c-saldo.rojo{color:var(--alerta)}
.c-sap{font-size:11px;font-weight:600;color:var(--txt-s);margin-bottom:1px}
.c-nom{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:7px}
.c-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;background:var(--panel);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:600;color:var(--txt-s)}
.tag.ti{background:#EFF6FF;color:#2563EB}.tag.tf{background:#F0FDF4;color:#15803D}
.tag.tl{background:#FFF7ED;color:#C2410C}.tag.td{background:#FDF4FF;color:#7C3AED}

/* ── MODALS ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-ov.vis{display:flex}
.m-sheet{background:var(--blanco);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;padding-bottom:32px}
.m-handle{text-align:center;padding:12px 0 0}
.m-handle::after{content:'';display:inline-block;width:38px;height:4px;background:#E0E0E0;border-radius:2px}
.m-hdr{padding:13px 17px 0;display:flex;justify-content:space-between;align-items:flex-start}
.m-ruta{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--rojo);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.m-sap{font-size:11px;color:var(--txt-s);margin-bottom:2px}
.m-nom{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;color:var(--txt);line-height:1.1}
.m-meta{font-size:12px;color:var(--txt-s);margin-top:3px}
.btn-x{background:var(--panel);border:none;border-radius:50%;width:33px;height:33px;font-size:15px;color:var(--txt-s);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m-body{padding:16px}
.s-hero{background:var(--negro);border-radius:12px;padding:16px;margin-bottom:14px;text-align:center}
.s-hero .lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.s-hero .monto{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:36px;line-height:1}
.s-hero .monto.verde{color:#4ADE80}.s-hero .monto.amarillo{color:#FCD34D}.s-hero .monto.rojo{color:#F87171}
.s-hero .e-txt{font-size:12px;color:rgba(255,255,255,.4);margin-top:5px}
.d-tit{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;margin-top:14px}
.doc-item{border:1.5px solid var(--borde);border-radius:10px;padding:12px;margin-bottom:7px;position:relative}
.doc-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.doc-item.pendiente::before{background:var(--amarillo)}.doc-item.vencido::before{background:var(--alerta)}.doc-item.pagado::before{background:var(--verde)}.doc-item.sel{border-color:var(--rojo);background:#FFF8F8}
.d-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.d-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--txt)}
.d-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--txt)}
.d-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.d-est{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.d-est.pendiente{background:#FFF3CD;color:#856404}.d-est.vencido{background:#FFE0E0;color:#C00}.d-est.pagado{background:#D4EDDA;color:#155724}
.d-fecha{font-size:11px;color:var(--txt-s)}
.d-dias{font-size:11px;font-weight:600;color:var(--txt-s)}.d-dias.urg{color:var(--alerta)}

/* ── LIQUIDACIÓN ── */
.doc-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.doc-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--rojo);margin-top:2px;flex-shrink:0;cursor:pointer}
.abono-wrap{margin-top:8px;display:none}
.abono-wrap.vis{display:block}
.abono-wrap label{font-size:11px;font-weight:600;color:var(--txt-s);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block}
.abono-wrap input{width:100%;background:var(--panel);border:1.5px solid var(--borde);border-radius:8px;padding:10px 13px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--txt);outline:none;transition:border-color .2s}
.abono-wrap input:focus{border-color:var(--rojo)}
.liq-form{background:var(--blanco);border-radius:12px;border:1.5px solid var(--borde);padding:16px;margin-bottom:12px}
.liq-form h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;color:var(--txt);margin-bottom:14px}
.f-campo{margin-bottom:13px}
.f-campo label{display:block;font-size:11px;font-weight:600;color:var(--txt-s);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.f-campo input,.f-campo select,.f-campo textarea{width:100%;background:var(--panel);border:1.5px solid var(--borde);border-radius:9px;padding:11px 14px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--txt);outline:none;transition:border-color .2s}
.f-campo input:focus,.f-campo select:focus,.f-campo textarea:focus{border-color:var(--rojo)}
.f-campo textarea{resize:vertical;min-height:70px}
.f-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upload-area{border:2px dashed var(--borde);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-area:hover{border-color:var(--rojo);background:#FFF8F8}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-area .u-ico{font-size:26px;margin-bottom:5px}
.upload-area .u-txt{font-size:13px;font-weight:600;color:var(--txt-s)}
.preview-img{width:100%;border-radius:8px;margin-top:10px;display:none}
.ia-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#a78bfa;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:10px}
.ia-badge::before{content:'✦';font-size:10px}
.alerta-dup{background:#FFF3CD;border:1.5px solid #F59E0B;border-radius:10px;padding:12px 14px;margin-bottom:12px;display:none}
.alerta-dup.vis{display:block}
.alerta-dup .a-tit{font-weight:700;font-size:13px;color:#92400E;margin-bottom:4px}
.alerta-dup .a-txt{font-size:12px;color:#78350F}
.btn-prim{width:100%;background:var(--rojo);color:var(--blanco);border:none;border-radius:10px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:6px}
.btn-prim:active{transform:scale(.98);background:var(--rojo-o)}
.btn-prim:disabled{background:#ccc;cursor:not-allowed}
.btn-sec{width:100%;background:var(--blanco);color:var(--txt);border:1.5px solid var(--borde);border-radius:10px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;margin-top:6px}
.pago-item{border:1.5px solid var(--borde);border-radius:10px;padding:12px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start}
.pago-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pago-ico.ef{background:#F0FDF4}.pago-ico.tr{background:#EFF6FF}.pago-ico.wa{background:#FFF7ED}
.pago-det{flex:1}
.pago-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:var(--verde)}
.pago-meta{font-size:11px;color:var(--txt-s);margin-top:2px}
.pago-obs{font-size:12px;color:var(--txt);margin-top:4px;font-style:italic}
.pago-comp img{width:56px;height:56px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--borde);margin-top:6px}

/* ── GERENCIA ── */
.ger-section{background:var(--blanco);border-radius:14px;border:1.5px solid var(--borde);margin-bottom:14px;overflow:hidden}
.ger-sec-hdr{padding:14px 16px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between}
.ger-sec-hdr h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--txt);letter-spacing:.3px}
.ger-sec-hdr .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-rojo{background:#FFE0E0;color:#C00}
.badge-verde{background:#D4EDDA;color:#155724}
.badge-azul{background:#EFF6FF;color:#2563EB}
.badge-am{background:#FFF3CD;color:#856404}
.ger-sec-body{padding:14px 16px}

/* Barra antigüedad */
.antig-grid{display:flex;flex-direction:column;gap:10px}
.antig-row{display:flex;align-items:center;gap:10px}
.antig-lbl{font-size:12px;font-weight:600;color:var(--txt-s);width:90px;flex-shrink:0}
.antig-bar-wrap{flex:1;background:var(--panel);border-radius:6px;height:10px;overflow:hidden}
.antig-bar{height:100%;border-radius:6px;transition:width .6s ease}
.antig-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;width:90px;text-align:right;flex-shrink:0}

/* Tabla mora */
.mora-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border:1px solid var(--borde);border-radius:10px;overflow:hidden;margin-bottom:12px}
.mora-hdr{background:var(--panel);padding:8px 10px;font-size:10px;font-weight:700;color:var(--txt-s);letter-spacing:1.5px;text-transform:uppercase}
.mora-cel{padding:9px 10px;font-size:12px;color:var(--txt);border-top:1px solid var(--borde)}
.mora-cel.bold{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px}
.mora-cel.rojo{color:var(--alerta)}.mora-cel.am{color:var(--amarillo)}.mora-cel.verde{color:var(--verde)}

/* Tabla FEMSA */
.femsa-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--borde)}
.femsa-item:last-child{border-bottom:none}
.femsa-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--borde);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.femsa-check.marcado{background:var(--verde);border-color:var(--verde);color:#fff;font-size:13px}
.femsa-det{flex:1}
.femsa-det .fn{font-size:13px;font-weight:600;color:var(--txt)}
.femsa-det .fm{font-size:11px;color:var(--txt-s);margin-top:2px}
.femsa-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--txt);flex-shrink:0}

/* Rutas perf */
.ruta-perf{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--borde)}
.ruta-perf:last-child{border-bottom:none}
.ruta-perf .rp-ruta{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--rojo);width:64px;flex-shrink:0}
.ruta-perf .rp-bar-wrap{flex:1;background:var(--panel);border-radius:5px;height:8px;overflow:hidden}
.ruta-perf .rp-bar{height:100%;background:var(--rojo);border-radius:5px;transition:width .6s ease}
.ruta-perf .rp-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--txt);width:80px;text-align:right;flex-shrink:0}

/* Btn imprimir */
.btn-print{display:flex;align-items:center;gap:8px;background:var(--negro);color:var(--blanco);border:none;border-radius:10px;padding:12px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-bottom:14px}
.btn-excel{display:flex;align-items:center;gap:8px;background:#1D6F42;color:var(--blanco);border:none;border-radius:10px;padding:12px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-bottom:14px}

// ═══════════════════════════════════════════════

const SB_URL = 'https://qwgauxyphjlywogqqdof.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Z2F1eHlwaGpseXdvZ3FxZG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzIyNTUsImV4cCI6MjA5MDgwODI1NX0.3yOE8R1HFZcDCx4EB8bDCwNMEZTLzol--LBtXZM1Ia4';

async function sbFetch(table, opts={}) {
  const {select='*', filters=[], order=null, limit=null, body=null, method='GET', rpc=null} = opts;
  let url = rpc ? `${SB_URL}/rest/v1/rpc/${rpc}` : `${SB_URL}/rest/v1/${table}`;
  const params = new URLSearchParams();
  if(select && method==='GET' && !rpc) params.set('select', select);
  filters.forEach(f => params.set(f[0], f[1]));
  if(order) params.set('order', order);
  if(limit) params.set('limit', limit);
  const qs = params.toString();
  if(qs) url += '?' + qs;
  const headers = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};
  const res = await fetch(url, {method, headers, body: body ? JSON.stringify(body) : undefined});
  if(!res.ok) { const e=await res.text(); throw new Error(e); }
  const ct = res.headers.get('content-type')||'';
  return ct.includes('json') ? res.json() : res.text();
}

async function sbInsert(table, body) {
  return sbFetch(table, {method:'POST', body, select:'*'});
}

async function sbUpdate(table, body, filters) {
  return sbFetch(table, {method:'PATCH', body, filters, select:'*'});
}

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let S=null, F={estado:'todos',tipo:'todos'}, tabActual='cartera';

// Cache en memoria (se recarga desde Supabase)
let CLIENTES=[], DOCS=[], PAGOS=[], FEMSA_ENTREGADO={}, ANULACIONES=[];
let gerTabActual='resumen'; // resumen | pagos | femsa | anulaciones

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const fmt=n=>'$'+Math.round(n).toLocaleString('es-CO');

// Format number input as Colombian currency on blur
function fmtInput(inp){
  const raw=parseFloat(inp.value.replace(/[^0-9]/g,''))||0;
  inp.dataset.raw=raw;
  inp.value=raw>0?raw.toLocaleString('es-CO'):'';
}
function getRaw(id){
  const el=document.getElementById(id);
  if(!el)return 0;
  return parseFloat(el.dataset.raw||el.value.replace(/[^0-9]/g,''))||0;
}
const dias=f=>{const d=new Date(f+'T00:00:00'),h=new Date();h.setHours(0,0,0,0);return Math.round((d-h)/864e5)};
const estDoc=d=>d.saldo===0?'pagado':dias(d.vencimiento)<0?'vencido':'pendiente';
const semaf=docs=>{const a=docs.filter(d=>d.saldo>0);if(!a.length)return'verde';if(a.some(d=>dias(d.vencimiento)<0))return'rojo';if(a.some(d=>dias(d.vencimiento)<=2))return'amarillo';return'verde'};
const suma=docs=>docs.reduce((s,d)=>s+d.saldo,0);
const dC=id=>DOCS.filter(d=>d.cliente_id===id);
const tipoLbl=t=>(({informal:'Inf. FEMSA',formal:'Formal FEMSA',local:'Local GMAZ',diario:'Diario'})[t]||t);
const medioIco=m=>(({efectivo:'💵',transferencia:'🏦',wallet:'💳'})[m]||'💰');
const medioCls=m=>(({efectivo:'ef',transferencia:'tr',wallet:'wa'})[m]||'ef');
const medioLbl=m=>(({efectivo:'Efectivo',transferencia:'Transferencia',wallet:'Wallet FEMSA'})[m]||m);
const hoyStr=new Date().toISOString().split('T')[0];
const rutas=()=>[...new Set(CLIENTES.map(c=>c.ruta))].sort();

function base(){
  if(!S)return[];
  if(S.rol==='vendedor')return CLIENTES.filter(c=>c.ruta===S.ruta);
  const r=document.getElementById('sel-ruta')?.value||'todas';
  return r==='todas'?CLIENTES:CLIENTES.filter(c=>c.ruta===r);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;void t.offsetWidth;t.classList.add('vis');setTimeout(()=>t.classList.remove('vis'),2500)}
function closeM(id){document.getElementById(id).classList.remove('vis')}
function cMod(e,id){if(e.target===document.getElementById(id))closeM(id)}
function zoomImg(src){document.getElementById('zoom-img').src=src;document.getElementById('img-zoom').classList.add('vis')}

function setLoading(msg){
  const ov=document.getElementById('loading-overlay');
  if(msg){document.getElementById('loading-txt').textContent=msg;ov.style.display='flex';}
  else{ov.style.display='none';}
}

// ═══════════════════════════════════════════════
// CARGA INICIAL DESDE SUPABASE
// ═══════════════════════════════════════════════
async function cargarDatos(){
  setLoading('Cargando clientes…');
  CLIENTES = await sbFetch('clientes', {filters:[['activo','eq.true']], order:'ruta.asc,nombre.asc'});

  setLoading('Cargando documentos…');
  DOCS = await sbFetch('documentos', {filters:[['saldo','gt.0']], order:'vencimiento.asc'});

  setLoading('Cargando pagos…');
  const pagosRaw = await sbFetch('pagos', {order:'creado_en.desc'});
  // Para cada pago, cargar sus documentos afectados
  const pdRaw = await sbFetch('pago_documentos', {select:'pago_id,documento_id,abono'});
  const docsMap = {};
  DOCS.forEach(d=>docsMap[d.id]=d.numero);
  PAGOS = pagosRaw.map(p=>{
    const pds = pdRaw.filter(pd=>pd.pago_id===p.id);
    return {...p, docsAfectados: pds.map(pd=>docsMap[pd.documento_id]||pd.documento_id)};
  });

  setLoading('Cargando estado FEMSA…');
  const femsa = await sbFetch('femsa_entregado');
  FEMSA_ENTREGADO = {};
  femsa.forEach(f=>FEMSA_ENTREGADO[f.documento_id]=true);

  setLoading('Cargando solicitudes de anulación…');
  try{ ANULACIONES = await sbFetch('anulaciones', {order:'creado_en.desc'}); }
  catch{ ANULACIONES = []; }

  setLoading(null);
}

// LOGIN / LOGOUT
// ═══════════════════════════════════════════════
async function login(){
  const u=document.getElementById('inp-u').value.trim();
  const p=document.getElementById('inp-p').value;
  setLoading('Verificando acceso…');
  try{
    const res = await sbFetch('usuarios', {
      filters:[['usuario','eq.'+u],['pass','eq.'+p],['activo','eq.true']],
      limit:'1'
    });
    if(!res||!res.length){
      setLoading(null);
      document.getElementById('err-l').style.display='block';
      return;
    }
    const usr = res[0];
    S = {u:usr.usuario, rol:usr.rol, nom:usr.nombre, ruta:usr.ruta};
    await cargarDatos();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('t-usr').textContent=usr.nombre;
    document.getElementById('t-mod').textContent={liquidacion:'Liquidación',gerencia:'Gerencia',supervisor:'Supervisor'}[usr.rol]||'Ventas';
    if(['gerencia','supervisor'].includes(usr.rol))document.getElementById('tab-ger').style.display='';
    if(usr.rol==='liquidacion'){document.getElementById('tab-liq').style.display='';document.getElementById('tab-doc').style.display='';document.getElementById('tab-rep').style.display='';}
    if(usr.rol==='gerencia'){document.getElementById('tab-liq').style.display='';document.getElementById('tab-doc').style.display='';document.getElementById('tab-rep').style.display='';}
    setTab(document.querySelector('.tab-btn[data-tab="cartera"]'));
  }catch(e){
    setLoading(null);
    showToast('Error de conexión con Supabase');
    console.error(e);
  }
}

document.getElementById('inp-p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});

function logout(){
  S=null;F={estado:'todos',tipo:'todos'};tabActual='cartera';
  CLIENTES=[];DOCS=[];PAGOS=[];FEMSA_ENTREGADO={};

function renderCartera(){

      <button class="f-btn" data-g="estado" data-v="aldia"   onclick="setF('estado','aldia',this)">🟢 Al día</button>
    </div></div>
    <div class="f-sec"><span class="f-lbl">Tipo de crédito</span><div class="f-bar">

function renderResumen(){
  const el=document.getElementById('resumen');if(!el)return;
  const cl=base(),act=DOCS.filter(d=>cl.some(c=>c.id===d.cliente_id)&&d.saldo>0);
  const total=suma(act),venc=act.filter(d=>dias(d.vencimiento)<0),prox=act.filter(d=>{const x=dias(d.vencimiento);return x>=0&&x<=2});
  const nR=cl.filter(c=>semaf(dC(c.id))==='rojo').length;
  el.innerHTML=`
    <div class="res-card full"><div class="etq">Cartera Total Activa</div><div class="val-big">${fmt(total)}</div><div class="val-sm">${cl.filter(c=>suma(dC(c.id))>0).length} clientes · ${act.length} documentos</div></div>
    <div class="res-card"><div class="etq">Vencido</div><div class="val-big rojo">${fmt(suma(venc))}</div><div class="val-sm">${nR} cliente${nR!==1?'s':''}</div></div>
    <div class="res-card"><div class="etq">Por vencer (2d)</div><div class="val-big am">${fmt(suma(prox))}</div><div class="val-sm">${prox.length} documentos</div></div>`;
}

function setF(g,v,btn){
  F[g]=v;
  document.querySelectorAll(`.f-btn[data-g="${g}"]`).forEach(b=>b.classList.remove('activo'));
  btn.classList.add('activo');renderLista();
}

function renderLista(){
  const busq=(document.getElementById('busq')?.value||'').toLowerCase();
  let lista=base().filter(c=>suma(dC(c.id))>0);
  if(F.tipo!=='todos')lista=lista.filter(c=>c.tipo===F.tipo);
  if(F.estado==='vencido')lista=lista.filter(c=>semaf(dC(c.id))==='rojo');
  else if(F.estado==='proximo')lista=lista.filter(c=>semaf(dC(c.id))==='amarillo');
  else if(F.estado==='aldia')lista=lista.filter(c=>semaf(dC(c.id))==='verde');
  if(busq)lista=lista.filter(c=>c.nombre.toLowerCase().includes(busq)||c.sap.includes(busq));
  const ord={rojo:0,amarillo:1,verde:2};
  lista.sort((a,b)=>ord[semaf(dC(a.id))]-ord[semaf(dC(b.id))]);
  const tit=document.getElementById('lista-tit');if(tit)tit.textContent=`${lista.length} cliente${lista.length!==1?'s':''}`;
  const cont=document.getElementById('lista');if(!cont)return;
  if(!lista.length){cont.innerHTML='<div class="empty"><div class="ico">📭</div><p>Sin clientes</p></div>';return}
  cont.innerHTML=lista.map((c,i)=>{
    const docs=dC(c.id),s=suma(docs.filter(d=>d.saldo>0)),col=semaf(docs);
    const pend=docs.filter(d=>d.saldo>0).length,nV=docs.filter(d=>d.saldo>0&&dias(d.vencimiento)<0).length;
    const tc=c.tipo==='informal'?'ti':c.tipo==='formal'?'tf':c.tipo==='local'?'tl':'td';
    return`<div class="c-card ${col}" style="animation-delay:${i*.025}s" onclick="abrirDetalle(${c.id})">
      <div class="c-r1"><div class="c-ruta">${c.ruta}</div><div class="c-saldo ${col}">${fmt(s)}</div></div>
      <div class="c-sap">SAP ${c.sap}</div><div class="c-nom">${c.nombre}</div>
      <div class="c-tags">
        <span class="tag ${tc}">${tipoLbl(c.tipo)}</span>
        <span class="tag">${pend} doc${pend!==1?'s':''}</span>
        ${nV?`<span class="tag" style="background:#FFE0E0;color:#C00">⚠ ${nV} venc.</span>`:''}
      </div></div>`;
  }).join('');
}

async function abrirDetalle(id){
  const c=CLIENTES.find(x=>x.id===id),docs=dC(id),s=suma(docs.filter(d=>d.saldo>0)),col=semaf(docs);
  document.getElementById('md-ruta').textContent=c.ruta;
  document.getElementById('md-sap').textContent='SAP '+c.sap;
  document.getElementById('md-nom').textContent=c.nombre;
  document.getElementById('md-meta').textContent=`${tipoLbl(c.tipo)} · Cupo: ${fmt(c.cupo)}`;
  const etxt={verde:'Al día',amarillo:'Por vencer',rojo:'Con cartera vencida'}[col];
  // Load ALL docs for this client (including paid ones) from Supabase
  let todosLosDocs=docs;
  try{
    const allDocs=await sbFetch('documentos',{filters:[['cliente_id','eq.'+id]],order:'vencimiento.desc'});
    if(allDocs&&allDocs.length)todosLosDocs=allDocs;
  }catch{}
  const docsPend=todosLosDocs.filter(d=>d.saldo>0).sort((a,b)=>new Date(a.vencimiento)-new Date(b.vencimiento));
  const docsPag=todosLosDocs.filter(d=>d.saldo===0&&!String(d.observaciones||'').includes('ANULADO')).sort((a,b)=>new Date(b.vencimiento)-new Date(a.vencimiento));
  const docsH=docsPend.map(doc=>{
    const est=estDoc(doc),dv=dias(doc.vencimiento);
    const dtxt=dv<0?`<span class="d-dias urg">Venció hace ${Math.abs(dv)}d</span>`:dv===0?`<span class="d-dias urg">Hoy</span>`:`<span class="d-dias">En ${dv}d</span>`;
    return`<div class="doc-item ${est}"><div class="d-row"><div class="d-num">${doc.numero}</div><div class="d-val">${fmt(doc.saldo)}</div></div>
      <div class="d-meta"><span class="d-est ${est}">${est==='vencido'?'Vencido':'Pendiente'}</span><span class="tag">${doc.tipo==='factura'?'🧾':'📋'} ${doc.tipo}</span><span class="d-fecha">${doc.emision}</span>${dtxt}</div>
      ${doc.valor!==doc.saldo?`<div style="font-size:11px;color:var(--txt-s);margin-top:4px">Orig: ${fmt(doc.valor)} · Abono: ${fmt(doc.valor-doc.saldo)}</div>`:''}
    </div>`;
  }).join('');
  const docsHPag=docsPag.length?`
    <div class="d-tit" style="margin-top:14px;color:var(--verde)">✓ Documentos Pagados (${docsPag.length})</div>
    ${docsPag.slice(0,10).map(doc=>`<div class="doc-item pagado" style="opacity:.75">
      <div class="d-row"><div class="d-num">${doc.numero}</div><div class="d-val" style="color:var(--verde)">${fmt(doc.valor)} ✓</div></div>
      <div class="d-meta"><span class="d-est pagado">Pagado</span><span class="tag">${doc.tipo==='factura'?'🧾':'📋'} ${doc.tipo}</span><span class="d-fecha">${doc.emision} → ${doc.vencimiento}</span></div>
    </div>`).join('')}`:'';
  const pagosCliente=PAGOS.filter(p=>p.cliente_id===id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const esGer=S&&S.rol==='gerencia';
  const pagosH=pagosCliente.map(p=>`
    <div class="pago-item"><div class="pago-ico ${medioCls(p.medio)}">${medioIco(p.medio)}</div>
      <div class="pago-det"><div class="pago-val">${fmt(p.valor)}</div>
        <div class="pago-meta">${medioLbl(p.medio)} · ${p.fecha} · ${p.registrado_por}</div>
        <div class="pago-meta">Docs: ${(p.docsAfectados||[]).join(', ')}</div>
        ${p.observaciones?`<div class="pago-obs">"${p.observaciones}"</div>`:''}
        ${p.ref_ia?`<div class="pago-meta" style="color:var(--verde);font-size:11px">Ref: ${p.ref_ia}</div>`:''}
        ${p.comprobante_url?`<div><img src="${p.comprobante_url}" style="width:54px;height:54px;object-fit:cover;border-radius:6px;margin-top:6px;cursor:pointer;border:1px solid var(--borde)" onclick="zoomImg('${p.comprobante_url}')"></div>`:''}
        ${esGer?`<button class="btn-sm rojo" style="margin-top:8px" onclick="eliminarPago(${p.id})">🗑 Eliminar pago</button>`:''}
      </div></div>`).join('')||'<p style="font-size:12px;color:var(--txt-s);text-align:center;padding:10px 0">Sin pagos</p>';
  const btnPagar=(S.rol==='liquidacion'||S.rol==='gerencia')?`<button class="btn-prim" style="margin-bottom:4px" onclick="abrirPago(${id});closeM('m-det')">💳 Registrar Pago</button>`:'';
  document.getElementById('md-body').innerHTML=`
    <div class="s-hero"><div class="lbl">Saldo Pendiente</div><div class="monto ${col}">${fmt(s)}</div><div class="e-txt">${etxt}</div></div>
    ${btnPagar}
    <div class="d-tit">Documentos Pendientes</div>${docsH||'<p style="color:var(--txt-s);font-size:12px;text-align:center;padding:12px 0">Sin documentos pendientes</p>'}
    ${docsHPag}
    <div class="d-tit" style="margin-top:18px">Historial de Pagos</div>${pagosH}`;
  document.getElementById('m-det').classList.add('vis');
}

function setGerTab(tab, btn){
  gerTabActual=tab;
  document.querySelectorAll('.ger-tab').forEach(b=>b.classList.remove('activo'));
  btn.classList.add('activo');
  renderGerContenido();
}

function renderGerencia(){
  const mc=document.getElementById('main');
  const pendAnul=ANULACIONES.filter(a=>a.estado==='pendiente').length;
  mc.innerHTML=`
    <div class="ger-tabs">
      <button class="ger-tab ${gerTabActual==='resumen'?'activo':''}" onclick="setGerTab('resumen',this)">📊 Resumen</button>
      <button class="ger-tab ${gerTabActual==='pagos'?'activo':''}" onclick="setGerTab('pagos',this)">💰 Pagos</button>

function renderGerContenido(){

  else if(gerTabActual==='femsa') renderGerFemsa();
  else if(gerTabActual==='anulaciones') renderGerAnulaciones();
}

async function resolverAnulacion(anulId, estado){
  const confirmMsg = estado==='aprobada' ? '¿Aprobar esta anulación? El documento quedará marcado como anulado.' : '¿Rechazar esta solicitud?';
  if(!confirm(confirmMsg)) return;
  setLoading(estado==='aprobada'?'Aprobando anulación…':'Rechazando solicitud…');
  try{
    const anulacion = ANULACIONES.find(a=>a.id===anulId);
    await sbUpdate('anulaciones',{estado, resuelto_por:S.nom, resuelto_en:new Date().toISOString()},[['id','eq.'+anulId]]);
    if(estado==='aprobada' && anulacion?.documento_id){
      // Marcar documento como anulado (saldo=0, observaciones=ANULADO)
      await sbUpdate('documentos',{saldo:0, observaciones:'ANULADO - '+anulacion.motivo},[['id','eq.'+anulacion.documento_id]]);
      // Actualizar cache local
      const doc=DOCS.find(d=>d.id===anulacion.documento_id);
      if(doc){doc.saldo=0;doc.observaciones='ANULADO';}
    }
    // Recargar anulaciones
    ANULACIONES = await sbFetch('anulaciones',{order:'creado_en.desc'});
    setLoading(null);
    showToast(estado==='aprobada'?'✓ Anulación aprobada':'Solicitud rechazada');
    renderGerencia();
  }catch(e){
    setLoading(null);
    showToast('Error al procesar');
    console.error(e);
  }
}

function toggleDocSel(docId,saldo){
  const chk=document.getElementById('chk-'+docId),aw=document.getElementById('abono-'+docId),di=document.getElementById('di-'+docId);

function calcTotal(){
  let t=0;
  Object.keys(PS.sel).forEach(id=>{const inp=document.getElementById('monto-'+id);t+=inp?parseFloat(inp.value)||0:PS.sel[id];});
  const el=document.getElementById('p-total');

function actualizarBtnPago(){
  const btn=document.getElementById('btn-gp');
  if(!btn)return;
  const total=parseFloat(document.getElementById('p-total')?.dataset?.raw||document.getElementById('p-total')?.value?.replace(/[^0-9]/g,'')||0);
  const tieneComp=!!PS.comp;
  if(PS.esDuplicado){
    btn.disabled=true;
    btn.textContent='🚫 Pago bloqueado — duplicado';
    return;
  }
  if(!tieneComp){
    btn.disabled=true;
    btn.textContent='📎 Sube el comprobante para continuar';
    return;
  }
  if(PS.valorComprobante!==null && Math.abs(PS.valorComprobante - parseFloat(document.getElementById('p-total')?.value||0)) > 100){
    btn.disabled=true;
    btn.textContent='⚠ Valor no coincide con comprobante';
    return;
  }
  btn.disabled=total<=0;
  btn.textContent='Registrar Pago';
}

// ── Anti-duplicados: hash + IA ──
async function calcularHash(b64){
  try{
    const raw=atob(b64.split(',')[1]),bytes=new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    const buf=await crypto.subtle.digest('SHA-256',bytes);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch{return null;}
}

async function procesarComp(input){
  if(!input.files||!input.files[0])return;
  currentCompFile=input.files[0];
  const reader=new FileReader();
  reader.onload=async e=>{
    PS.comp=e.target.result;
    const prev=document.getElementById('comp-prev');
    if(prev){prev.src=PS.comp;prev.style.display='block';}
    const iaEl=document.getElementById('ia-est');
    document.getElementById('alerta-dup').classList.remove('vis');
    iaEl.innerHTML='<span class="spinner"></span>Verificando imagen…';
    const hash=await calcularHash(PS.comp);
    PS.hashComp=hash;
    if(hash){
      // Buscar hash en Supabase
      try{
        const res=await sbFetch('refs_comprobantes',{filters:[['hash_imagen','eq.'+hash]],limit:'1'});
        if(res&&res.length){
          document.getElementById('alerta-dup').classList.add('vis');
          document.getElementById('dup-txt').innerHTML=`<strong>Imagen idéntica</strong> registrada el ${res[0].fecha} · ${res[0].cliente} · ${fmt(res[0].valor||0)}`;
          iaEl.innerHTML=`<span style="color:var(--alerta)">🔴 Duplicado exacto detectado</span>`;
          return;
        }
      }catch{}
    }
    iaEl.innerHTML='<span class="spinner"></span>Analizando comprobante con IA…';
    await verificarIA(PS.comp);
  };
  reader.readAsDataURL(currentCompFile);
}

async function verificarIA(b64){
  const iaEl=document.getElementById('ia-est');
  const mt=b64.includes('image/png')?'image/png':b64.includes('image/webp')?'image/webp':'image/jpeg';
  const totalPago=parseFloat(document.getElementById('p-total')?.dataset?.raw||document.getElementById('p-total')?.value?.replace(/[^0-9]/g,'')||0);
  try{
    const resp=await fetch('https://qwgauxyphjlywogqqdof.supabase.co/functions/v1/swift-api',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:350,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64.split(',')[1]}},
          {type:'text',text:`Analiza este comprobante de pago colombiano con maxima precision. Extrae:
1. referencia: numero unico de transaccion (Ref., No. transaccion, CUS, RRN, codigo aprobacion, etc.)
2. valor: valor total transferido en pesos colombianos (solo numero entero sin puntos ni comas)
3. fecha: fecha de la transaccion en formato YYYY-MM-DD
4. banco: banco o plataforma de origen
5. cuenta_destino: numero de cuenta o entidad destino si aparece, sino null

IMPORTANTE sobre el valor:
- En Colombia se usa punto como separador de miles y coma como decimal
- $57.000,00 = 57000 pesos (los ,00 son centavos, ignorarlos)
- $212.434 = 212434 pesos
- $1.500.000 = 1500000 pesos
- Devuelve el valor siempre como numero entero en pesos, sin decimales, sin puntos, sin comas

Responde UNICAMENTE con JSON valido sin markdown ni texto extra:
{"referencia":"CODIGO","valor":0,"fecha":"YYYY-MM-DD","banco":"nombre","cuenta_destino":"numero_o_null"}`}
        ]}]
      })
    });
    if(!resp.ok)throw new Error('API '+resp.status);
    const data=await resp.json();
    const txt=data.content?.find(b=>b.type==='text')?.text||'{}';
    let r;
    try{r=JSON.parse(txt.replace(/\`\`\`[a-z]*/g,'').replace(/\`\`\`/g,'').trim());}
    catch{r={referencia:null,valor:0,fecha:'—',banco:'—',cuenta_destino:'—'};}

    PS.refIA=r.referencia;
    PS.extractedMeta={fecha:r.fecha,banco:r.banco,valor:r.valor,cuenta_destino:r.cuenta_destino};
    PS.valorComprobante=r.valor||null;
    PS.datosComp=r;

    const diffValor=Math.abs((r.valor||0)-totalPago);
    const valorOk=(!r.valor||r.valor===0)||diffValor<=100;

    // Panel de datos extraídos
    const colorVal=valorOk?'var(--verde)':'var(--alerta)';
    const labelVal=valorOk?'✓':'⚠ NO COINCIDE';
    const datosTxt=`<div style="background:var(--panel);border-radius:8px;padding:10px 13px;margin-top:8px;font-size:12px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px">📋 Datos del comprobante</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:3px 12px">
        <span style="color:var(--txt-s)">Referencia</span><span style="font-weight:600">${r.referencia||'No encontrada'}</span>
        <span style="color:var(--txt-s)">Valor</span><span style="font-weight:700;color:${colorVal}">${fmt(r.valor||0)} ${labelVal}</span>
        <span style="color:var(--txt-s)">Fecha</span><span style="font-weight:600">${r.fecha||'—'}</span>
        <span style="color:var(--txt-s)">Banco</span><span style="font-weight:600">${r.banco||'—'}</span>
        <span style="color:var(--txt-s)">Cuenta destino</span><span style="font-weight:600">${r.cuenta_destino||'—'}</span>
      </div></div>`;

    // Chequear duplicado por referencia
    let esDupRef=false;
    if(r.referencia&&r.referencia!=='null'){
      try{
        const res=await sbFetch('refs_comprobantes',{filters:[['referencia','eq.'+r.referencia.replace(/\s+/g,'').toUpperCase()]],limit:'1'});
        if(res&&res.length){
          esDupRef=true;
          PS.esDuplicado=true;
          document.getElementById('alerta-dup').classList.add('vis');
          document.getElementById('dup-txt').innerHTML=`<strong>Ref. "${r.referencia}"</strong> ya registrada el ${res[0].fecha} · ${res[0].cliente} · ${fmt(res[0].valor||0)}`;
        }
      }catch{}
    }

    if(esDupRef){
      iaEl.innerHTML=`<span style="color:var(--alerta)">🔴 Duplicado — pago bloqueado</span>${datosTxt}`;
    } else if(!valorOk){
      iaEl.innerHTML=`<span style="color:var(--alerta)">⚠ Valor comprobante (${fmt(r.valor)}) ≠ pago (${fmt(totalPago)}) — diferencia ${fmt(diffValor)}</span>${datosTxt}`;
    } else {
      iaEl.innerHTML=`<span style="color:var(--verde)">✓ Comprobante verificado</span>${datosTxt}`;
    }
  }catch(e){
    PS.valorComprobante=0;
    iaEl.innerHTML=`<span style="color:var(--txt-s)">IA no disponible · ${PS.hashComp?'✓ Hash activo':''}</span>`;
  }
  actualizarBtnPago();
}

async function subirComprobante(b64, pagoId){
  // Convert base64 to blob
  try{
    const arr=b64.split(',');
    const mt=arr[0].match(/:(.*?);/)[1];
    const ext=mt.includes('png')?'png':mt.includes('webp')?'webp':'jpg';
    const bstr=atob(arr[1]);
    const u8=new Uint8Array(bstr.length);
    for(let i=0;i<bstr.length;i++)u8[i]=bstr.charCodeAt(i);
    const blob=new Blob([u8],{type:mt});
    const filename=`pago_${pagoId}_${Date.now()}.${ext}`;
    const res=await fetch(`${SB_URL}/storage/v1/object/comprobantes/${filename}`,{
      method:'POST',
      headers:{
        'Authorization':'Bearer '+SB_KEY,
        'apikey':SB_KEY,
        'Content-Type':mt,
        'x-upsert':'true'
      },
      body:blob
    });
    if(!res.ok)throw new Error(await res.text());
    return `${SB_URL}/storage/v1/object/public/comprobantes/${filename}`;
  }catch(e){
    console.error('Error subiendo comprobante:',e);
    return null;
  }
}

async function guardarPago(cId){
  if(PS.esDuplicado){showToast('Pago bloqueado — comprobante duplicado');return}
  const fecha=document.getElementById('p-fecha')?.value||hoyStr;
  const medio=document.getElementById('p-medio')?.value||'efectivo';
  const obs=document.getElementById('p-obs')?.value||'';
  const abonosPorDoc={};let total=0;
  Object.keys(PS.sel).forEach(docId=>{
    const inp=document.getElementById('monto-'+docId);
    const raw=inp?parseFloat(inp.dataset.raw||inp.value.replace(/[^0-9]/g,'')||0):0;
    const abono=Math.min(raw,PS.sel[docId]);
    if(abono>0){abonosPorDoc[docId]=abono;total+=abono;}
  });
  if(total===0){showToast('Selecciona documentos');return}
  const c=CLIENTES.find(x=>x.id===cId);
  setLoading('Guardando pago…');
  try{
    // 1. Insertar pago
    // Subir comprobante a Storage si existe
    const pagoRes=await sbInsert('pagos',{
      cliente_id:cId,fecha,medio,valor:total,observaciones:obs,
      ref_ia:PS.refIA||null,hash_imagen:PS.hashComp||null,
      registrado_por:S.nom
    });
    const pagoId=pagoRes[0].id;
    // Subir imagen y actualizar URL
    if(PS.comp){
      const url=await subirComprobante(PS.comp, pagoId);
      if(url){
        await sbUpdate('pagos',{comprobante_url:url},[['id','eq.'+pagoId]]);
        pagoRes[0].comprobante_url=url;
      }
    }

    // 2. Actualizar saldos y registrar pago_documentos
    const docsAfectados=[];
    for(const [docId,abono] of Object.entries(abonosPorDoc)){
      const doc=DOCS.find(d=>d.id===parseInt(docId));
      if(!doc)continue;
      const nuevoSaldo=Math.max(0,doc.saldo-abono);
      await sbUpdate('documentos',{saldo:nuevoSaldo},[['id','eq.'+docId]]);
      await sbInsert('pago_documentos',{pago_id:pagoId,documento_id:parseInt(docId),abono});
      doc.saldo=nuevoSaldo;
      docsAfectados.push(doc.numero);
    }

    // 3. Guardar ref anti-duplicados en Supabase
    const meta={fecha,cliente:c?c.nombre:'—',valor:total,banco:PS.extractedMeta?.banco||medioLbl(medio)};
    if(PS.hashComp){
      try{await sbInsert('refs_comprobantes',{hash_imagen:PS.hashComp,...meta,referencia:'HASH_'+PS.hashComp.substring(0,8)});}catch{}
    }
    if(PS.refIA&&PS.refIA!=='null'){
      try{await sbInsert('refs_comprobantes',{referencia:PS.refIA.replace(/\s+/g,'').toUpperCase(),...meta});}catch{}
    }

    // 4. Actualizar cache local
    PAGOS.unshift({id:pagoId,cliente_id:cId,fecha,medio,valor:total,observaciones:obs,registrado_por:S.nom,docsAfectados,comprobante_url:pagoRes[0].comprobante_url||null});
    // Recargar docs desde Supabase para tener saldos frescos
    DOCS=await sbFetch('documentos',{filters:[['saldo','gt.0']],order:'vencimiento.asc'});

    setLoading(null);
    closeM('m-pago');
    showToast(`✓ Pago de ${fmt(total)} registrado`);
    renderMain();
  }catch(e){
    setLoading(null);
    showToast('Error al guardar — intenta de nuevo');
    console.error(e);
  }
}

function filtrarClientesDoc(){
  const q=(document.getElementById('nd-busq')?.value||'').toLowerCase().trim();
  const dd=document.getElementById('nd-dropdown');
  if(!dd)return;
  if(q.length<2){dd.style.display='none';return;}
  const resultados=CLIENTES.filter(c=>
    c.nombre.toLowerCase().includes(q)||
    c.sap.includes(q)||
    c.ruta.toLowerCase().includes(q)
  ).slice(0,8);
  if(!resultados.length){dd.style.display='none';return;}
  dd.innerHTML=resultados.map(c=>`
    <div onclick="seleccionarClienteDoc(${c.id})" style="padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--borde);transition:background .1s"
      onmouseover="this.style.background='#FFF8F8'" onmouseout="this.style.background=''">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--rojo)">${c.ruta}</div>
      <div style="font-size:11px;color:var(--txt-s)">SAP ${c.sap}</div>
      <div style="font-size:13px;font-weight:600;color:var(--txt)">${c.nombre}</div>

  dd.style.display='block';
}

function seleccionarClienteDoc(id){
  const c=CLIENTES.find(x=>x.id===id);
  if(!c)return;
  document.getElementById('nd-c').value=id;
  document.getElementById('nd-busq').value=`${c.ruta} · ${c.sap} · ${c.nombre}`;
  document.getElementById('nd-dropdown').style.display='none';
  const sel=document.getElementById('nd-seleccionado');
  sel.innerHTML=`✓ <strong>${c.ruta}</strong> · SAP ${c.sap} · ${c.nombre} · ${tipoLbl(c.tipo)} · Cupo: ${fmt(c.cupo)}`;

function calcVence(){
  const e=document.getElementById('nd-e')?.value,cr=document.getElementById('nd-cr')?.value;
  if(!e||!cr)return;
  const n=cr==='30'?30:cr==='1'?1:8;
  const f=new Date(e+'T00:00:00');f.setDate(f.getDate()+n);
  const el=document.getElementById('nd-venc');if(el)el.value=f.toISOString().split('T')[0];
  // Mostrar campo foto si es formal o informal
  const campoFoto=document.getElementById('campo-foto-factura');
  const clienteId=parseInt(document.getElementById('nd-c')?.value||0);
  const cliente=CLIENTES.find(x=>x.id===clienteId);
  const tipoFemsa=cliente&&['informal','formal'].includes(cliente.tipo);
  if(campoFoto)campoFoto.style.display=tipoFemsa?'block':'none';
}

function previsualizarFotoDoc(input){
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById('nd-foto-prev');
    if(prev){prev.src=e.target.result;prev.style.display='block';}
  };
  reader.readAsDataURL(input.files[0]);
}

async function guardarDoc(){
  const cId=parseInt(document.getElementById('nd-c')?.value);
  const tipo=document.getElementById('nd-t')?.value;
  const num=(document.getElementById('nd-n')?.value||'').trim();
  const emision=document.getElementById('nd-e')?.value;
  const vence=document.getElementById('nd-venc')?.value;
  const valor=parseFloat(document.getElementById('nd-v')?.dataset?.raw||document.getElementById('nd-v')?.value?.replace(/[^0-9]/g,'')||0);
  const obs=document.getElementById('nd-obs')?.value||'';
  if(!cId||!num||!emision||!vence||valor<=0){showToast('Completa todos los campos');return}
  // Validar foto obligatoria para formal/informal
  const cliente=CLIENTES.find(x=>x.id===cId);
  const requiereFoto=cliente&&['informal','formal'].includes(cliente.tipo);
  const fotoInput=document.getElementById('nd-foto');
  const tieneFoto=fotoInput&&fotoInput.files&&fotoInput.files.length>0;
  if(requiereFoto&&!tieneFoto){showToast('⚠ Debes subir la factura firmada y sellada');return}
  setLoading('Guardando documento…');
  try{
    const res=await sbInsert('documentos',{cliente_id:cId,tipo,numero:num,emision,vencimiento:vence,valor,saldo:valor,observaciones:obs,ingresado_por:S.nom});
    DOCS.push(res[0]);
    // Subir foto de factura si existe
    if(tieneFoto&&fotoInput.files[0]){
      const reader=new FileReader();
      reader.onload=async ev=>{
        const url=await subirComprobante(ev.target.result,'factura_'+res[0].id);
        if(url)await sbUpdate('documentos',{observaciones:(obs?obs+' | ':'')+`FOTO:${url}`},[['id','eq.'+res[0].id]]);
      };
      reader.readAsDataURL(fotoInput.files[0]);
    }
    setLoading(null);
    showToast(`✓ ${num} ingresado`);
    document.getElementById('nd-n').value='';document.getElementById('nd-v').value='';document.getElementById('nd-obs').value='';
    if(fotoInput)fotoInput.value='';
    const prevFoto=document.getElementById('nd-foto-prev');if(prevFoto){prevFoto.src='';prevFoto.style.display='none';}
    renderUltimos();
  }catch(e){
    setLoading(null);
    if(e.message.includes('unique'))showToast('Número ya existe');
    else showToast('Error al guardar');
    console.error(e);
  }
}

function renderUltimos(){
  const cont=document.getElementById('ultimos');if(!cont)return;
  const ul=DOCS.slice(-6).reverse();
  if(!ul.length){cont.innerHTML='<p style="font-size:12px;color:var(--txt-s)">Sin documentos aún</p>';return}
  cont.innerHTML=ul.map(doc=>{
    const c=CLIENTES.find(x=>x.id===doc.cliente_id);
    const esLiq=S&&S.rol==='liquidacion';
    const esGer=S&&S.rol==='gerencia';

      <div class="d-row"><div class="d-num">${doc.numero}</div><div class="d-val">${fmt(doc.valor)}</div></div>

      ${puedeAnular?`<div style="margin-top:8px"><button class="btn-sm ${esGer?'rojo':'gris'}" onclick="${esGer?`anularDirecto(${doc.id})`:`solicitarAnulacion(${doc.id})`}">${esGer?'🗑 Anular documento':'⚠ Solicitar anulación'}</button></div>`:''}
    </div>`;
  }).join('');
}

async function solicitarAnulacion(docId){

      solicitado_por:S.nom

async function anularDirecto(docId){
  const doc=DOCS.find(d=>d.id===docId);
  if(!doc){showToast('Documento no encontrado');return}
  const motivo=prompt(`Motivo de anulación para ${doc.numero}:`);
  if(!motivo||!motivo.trim())return;
  if(!confirm(`¿Anular ${doc.numero} por $${doc.valor.toLocaleString('es-CO')}? Esta acción no se puede deshacer.`))return;
  setLoading('Anulando documento…');
  try{
    await sbUpdate('documentos',{saldo:0,observaciones:'ANULADO - '+motivo.trim()},[['id','eq.'+docId]]);
    // Registrar en anulaciones con estado aprobada
    await sbInsert('anulaciones',{
      documento_id:docId, cliente_id:doc.cliente_id,
      numero_doc:doc.numero, valor_doc:doc.valor,
      motivo:motivo.trim(), estado:'aprobada',
      solicitado_por:S.nom, resuelto_por:S.nom,
      resuelto_en:new Date().toISOString()
    });
    doc.saldo=0;doc.observaciones='ANULADO';
    // Recargar docs
    DOCS=await sbFetch('documentos',{filters:[['saldo','gt.0']],order:'vencimiento.asc'});
    ANULACIONES=await sbFetch('anulaciones',{order:'creado_en.desc'});
    setLoading(null);
    showToast(`✓ ${doc.numero} anulado`);
    renderMain();
  }catch(e){
    setLoading(null);
    showToast('Error al anular');
    console.error(e);
  }
}

async function eliminarPago(pagoId){
  if(!confirm('¿Eliminar este pago? Los saldos de los documentos afectados se restaurarán automáticamente.'))return;
  setLoading('Eliminando pago…');
  try{
    // 1. Obtener pago_documentos para restaurar saldos
    const pds=await sbFetch('pago_documentos',{filters:[['pago_id','eq.'+pagoId]]});
    // 2. Restaurar saldo de cada documento
    for(const pd of pds){
      const doc=DOCS.find(d=>d.id===pd.documento_id);
      const nuevoSaldo=(doc?.saldo||0)+pd.abono;
      await sbUpdate('documentos',{saldo:nuevoSaldo},[['id','eq.'+pd.documento_id]]);
      if(doc)doc.saldo=nuevoSaldo;
    }
    // 3. Eliminar pago_documentos
    await sbFetch('pago_documentos',{method:'DELETE',filters:[['pago_id','eq.'+pagoId]]});
    // 4. Eliminar pago
    await sbFetch('pagos',{method:'DELETE',filters:[['id','eq.'+pagoId]]});
    // 5. Actualizar cache local
    PAGOS=PAGOS.filter(p=>p.id!==pagoId);
    // 6. Recargar docs desde Supabase
    DOCS=await sbFetch('documentos',{order:'vencimiento.asc'});
    setLoading(null);
    showToast('✓ Pago eliminado y saldos restaurados');
    renderGerencia();
  }catch(e){
    setLoading(null);
    showToast('Error al eliminar pago');
    console.error(e);
  }
}

function exportarExcel(){
  const wb=XLSX.utils.book_new();
  const fmtN=n=>Math.round(n);
  const h1=[['Ruta','SAP','Cliente','Tipo','Saldo','Docs Activos','Estado']];
  CLIENTES.forEach(c=>{const docs=dC(c.id).filter(d=>d.saldo>0);if(!docs.length)return;const s=suma(docs),col=semaf(docs);h1.push([c.ruta,c.sap,c.nombre,tipoLbl(c.tipo),fmtN(s),docs.length,col==='rojo'?'Vencido':col==='amarillo'?'Por vencer':'Al día']);});
  const ws1=XLSX.utils.aoa_to_sheet(h1);ws1['!cols']=[{wch:10},{wch:14},{wch:36},{wch:16},{wch:16},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,'Cartera Clientes');
  const h2=[['Ruta','SAP','Cliente','Tipo','Número','Emisión','Vencimiento','Valor','Saldo','Estado','Días Mora']];
  DOCS.filter(d=>d.saldo>0).forEach(doc=>{const c=CLIENTES.find(x=>x.id===doc.cliente_id);if(!c)return;const dv=dias(doc.vencimiento);h2.push([c.ruta,c.sap,c.nombre,tipoLbl(c.tipo),doc.numero,doc.emision,doc.vencimiento,fmtN(doc.valor),fmtN(doc.saldo),dv<0?'Vencido':'Pendiente',dv<0?Math.abs(dv):0]);});
  const ws2=XLSX.utils.aoa_to_sheet(h2);XLSX.utils.book_append_sheet(wb,ws2,'Documentos');
  const h3=[['Fecha','Ruta','SAP','Cliente','Medio','Valor','Documentos','Observaciones','Ref IA','Registrado Por']];
  PAGOS.forEach(p=>{const c=CLIENTES.find(x=>x.id===p.cliente_id);h3.push([p.fecha,c?c.ruta:'—',c?c.sap:'—',c?c.nombre:'—',medioLbl(p.medio),fmtN(p.valor),(p.docsAfectados||[]).join(', '),p.observaciones||'',p.ref_ia||'',p.registrado_por]);});
  const ws3=XLSX.utils.aoa_to_sheet(h3);XLSX.utils.book_append_sheet(wb,ws3,'Pagos');
  XLSX.writeFile(wb,`Cartera_GMAZ_${hoyStr}.xlsx`);
  showToast('✓ Excel descargado');
}
